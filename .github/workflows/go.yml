name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.16

    - name: Install Dependencies
      run: |
        go version
        go get -u golang.org/x/lint/golint
          
    - name: Run Linter
      run: golint .

    - name: Build
      run: go bu  ild -v main.go
