name: Go Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron:  0 0 * * *

jobs:

  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.18

    - name: Code Examination
      run: go vet ./src/...
      
    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...
